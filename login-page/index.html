<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODY 登录页面</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            width: 375px;
            height: 812px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 状态栏 */
        .status-bar {
            width: 100%;
            height: 40px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-bar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 20px;
        }

        .time {
            font-size: 14px;
            font-weight: 600;
            color: #000000;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            font-size: 12px;
        }

        /* 欢迎标题 */
        .welcome-title {
            margin: 32px 0px 0px;
            line-height: 16px;
            letter-spacing: 0;
            color: #fecc2a;
            font-size: 28px;
            font-weight: 500;
            text-align: center;
        }

        /* 插画区域 */
        .illustration {
            position: relative;
            margin-top: 64px;
            width: 375px;
            height: 249px;
        }

        .city-background {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #f0f0f0 0%, #e0e0e0 100%);
            border-radius: 0 0 50% 50%;
            overflow: hidden;
        }

        .location-pin {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        .pin-icon {
            width: 60px;
            height: 60px;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .car {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .car-body {
            font-size: 50px;
        }

        .person {
            position: absolute;
            bottom: 50px;
            right: 40px;
            z-index: 2;
        }

        .person-icon {
            font-size: 35px;
        }

        .phone-mockup {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 50px;
            height: 90px;
            background: #333;
            border-radius: 8px;
            padding: 4px;
            z-index: 1;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 4px;
        }

        .map-display {
            font-size: 12px;
        }

        .list-display {
            font-size: 10px;
        }

        /* 手机号输入区域 */
        .phone-input-section {
            position: relative;
            margin-top: 64px;
            width: 327px;
            height: 44px;
        }

        .phone-input {
            display: flex;
            align-items: center;
            width: 100%;
            height: 44px;
            border: 1px solid #bdbdbd;
            border-radius: 12px;
            padding: 0 16px;
            background: #ffffff;
        }

        .country-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 80px;
        }

        .flag {
            font-size: 18px;
        }

        .arrow {
            font-size: 10px;
            color: #666;
        }

        .country-code {
            color: #fecc2a;
            font-size: 16px;
            font-weight: 500;
            margin-left: 8px;
        }

        .divider {
            width: 1px;
            height: 20px;
            background: #bdbdbd;
            margin: 0 12px;
        }

        .phone-input-field {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            color: #bdbdbd;
            font-family: inherit;
        }

        .phone-input-field::placeholder {
            color: #bdbdbd;
        }

        /* 社交媒体提示 */
        .social-prompt {
            margin: 24px 0px 0px;
            line-height: 18px;
            letter-spacing: 0;
            color: #959595;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }

        /* 社交媒体按钮 */
        .social-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 16px 0 0;
            height: 40px;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
        }

        .social-button:hover {
            transform: scale(1.1);
        }

        .social-button:active {
            transform: scale(0.95);
        }

        .facebook {
            background: #395898;
        }

        .twitter {
            background: #1aa8e6;
        }

        .google {
            background: #e34f33;
        }

        .social-icon {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
        }

        /* 底部指示器 */
        .home-indicator {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            margin-top: auto;
            padding: 21px 0 8px;
            width: 100%;
        }

        .indicator {
            border-radius: 100px;
            background: #49493d;
            width: 134px;
            height: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-bar-content">
                <span class="time">9:09</span>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>
        </div>

        <!-- 欢迎标题 -->
        <h1 class="welcome-title">WELCOME TO GODY!</h1>

        <!-- 插画区域 -->
        <div class="illustration">
            <div class="city-background">
                <!-- 定位图标 -->
                <div class="location-pin">
                    <div class="pin-icon">📍</div>
                </div>

                <!-- 黄色汽车 -->
                <div class="car">
                    <div class="car-body">🚗</div>
                </div>

                <!-- 人物 -->
                <div class="person">
                    <div class="person-icon">👨‍💼</div>
                </div>

                <!-- 手机界面 -->
                <div class="phone-mockup">
                    <div class="phone-screen">
                        <div class="map-display">🗺️</div>
                        <div class="list-display">📋</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 手机号输入区域 -->
        <div class="phone-input-section">
            <div class="phone-input">
                <!-- 国家选择器 -->
                <div class="country-selector">
                    <span class="flag">🇬🇧</span>
                    <span class="arrow">▼</span>
                    <span class="country-code">+44</span>
                </div>

                <!-- 分隔线 -->
                <div class="divider"></div>

                <!-- 手机号输入框 -->
                <input
                    type="tel"
                    class="phone-input-field"
                    placeholder="Enter your mobile number"
                />
            </div>
        </div>

        <!-- 社交媒体登录提示 -->
        <p class="social-prompt">
            Or connect using to social media account
        </p>

        <!-- 社交媒体登录按钮 -->
        <div class="social-buttons">
            <button class="social-button facebook" onclick="handleSocialLogin('Facebook')">
                <span class="social-icon">f</span>
            </button>

            <button class="social-button twitter" onclick="handleSocialLogin('Twitter')">
                <span class="social-icon">🐦</span>
            </button>

            <button class="social-button google" onclick="handleSocialLogin('Google')">
                <span class="social-icon">G+</span>
            </button>
        </div>

        <!-- 底部指示器 -->
        <div class="home-indicator">
            <div class="indicator"></div>
        </div>
    </div>

    <script>
        // 处理社交媒体登录
        function handleSocialLogin(platform) {
            alert(`使用${platform}登录`);
            console.log(`使用${platform}登录`);
        }

        // 处理手机号输入
        document.querySelector('.phone-input-field').addEventListener('input', function(e) {
            console.log('手机号输入:', e.target.value);
        });

        // 添加输入框焦点效果
        const phoneInput = document.querySelector('.phone-input');
        const phoneField = document.querySelector('.phone-input-field');

        phoneField.addEventListener('focus', function() {
            phoneInput.style.borderColor = '#fecc2a';
        });

        phoneField.addEventListener('blur', function() {
            phoneInput.style.borderColor = '#bdbdbd';
        });
    </script>
</body>
</html>
