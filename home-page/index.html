<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - GODY</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .home-container {
            position: relative;
            background: #ffffff;
            width: 375px;
            height: 812px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 地图背景区域 */
        .map-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 375px;
            height: 496px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            background-image: 
                radial-gradient(circle at 20% 30%, #d0d0d0 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, #d0d0d0 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, #d0d0d0 1px, transparent 1px);
            background-size: 50px 50px, 30px 30px, 40px 40px;
        }

        /* 状态栏 */
        .status-bar {
            width: 375px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #49493d;
            font-size: 14px;
            font-weight: 600;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            font-size: 12px;
        }

        /* 用户信息区域 */
        .user-section {
            display: flex;
            align-items: center;
            margin-top: 16px;
            padding: 0 24px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            overflow: hidden;
        }

        .greeting {
            margin-left: 12px;
            color: #49493d;
            font-size: 16px;
            font-weight: 500;
        }

        .menu-icon {
            margin-left: 89px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            color: #49493d;
        }

        /* 定位按钮 */
        .location-btn {
            position: absolute;
            top: 167px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .location-btn:hover {
            transform: scale(1.1);
        }

        /* 底部操作面板 */
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 375px;
            height: 417px;
            background: #ffffff;
            border-radius: 24px 24px 0 0;
            padding-top: 32px;
            box-shadow: 0px -4px 20px rgba(0,0,0,0.1);
        }

        /* 搜索框 */
        .search-container {
            margin: 0 24px;
            padding: 14px 16px;
            background: #f3f3f3;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        .search-icon {
            width: 20px;
            height: 20px;
            color: #959595;
        }

        .search-input {
            flex: 1;
            margin: 0 8px;
            border: none;
            background: transparent;
            font-size: 14px;
            color: #bdbdbd;
            outline: none;
        }

        .schedule-link {
            color: #49493d;
            font-size: 12px;
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
        }

        /* 分割线 */
        .divider {
            margin: 12px 27px 0;
            height: 1px;
            background: #f3f3f3;
        }

        /* 位置选项 */
        .location-options {
            margin: 24px 24px 0;
        }

        .location-option {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .location-option:hover {
            opacity: 0.8;
        }

        .location-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        .location-text {
            color: #49493d;
            font-size: 16px;
        }

        /* 底部按钮区域 */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin: 32px 24px 0;
            padding-right: 103px;
        }

        .trips-btn {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            background: #fecc2a;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .trips-btn:hover {
            background: #e6b824;
            transform: translateY(-2px);
        }

        .eats-btn {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            background: #f3f3f3;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .eats-btn:hover {
            background: #e8e8e8;
            transform: translateY(-2px);
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        .btn-text {
            color: #49493d;
            font-size: 16px;
            font-weight: 500;
        }

        /* 底部指示器 */
        .home-indicator {
            display: flex;
            justify-content: center;
            margin-top: 75px;
            padding: 21px 120px 8px;
        }

        .indicator {
            width: 134px;
            height: 5px;
            background: #49493d;
            border-radius: 100px;
        }

        /* 地图上的车辆 */
        .map-cars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 496px;
            pointer-events: none;
        }

        .map-car {
            position: absolute;
            width: 16px;
            height: 32px;
            font-size: 14px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .map-car:hover {
            transform: scale(1.2);
        }

        /* 车辆位置 */
        .car1 { top: 120px; left: 30px; transform: rotate(90deg); }
        .car2 { top: 259px; left: 53px; transform: rotate(-47deg); }
        .car3 { top: 208px; left: 83px; transform: rotate(90deg); }
        .car4 { top: 185px; left: 120px; transform: rotate(23deg); }
        .car5 { top: 240px; left: 190px; transform: rotate(77deg); }
        .car6 { top: 275px; left: 214px; transform: rotate(-47deg); }
        .car7 { top: 234px; left: 264px; transform: rotate(-47deg); }
    </style>
</head>
<body>
    <div class="home-container">
        <!-- 地图背景 -->
        <div class="map-background">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span>9:09</span>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- 用户信息 -->
            <div class="user-section">
                <div class="avatar">👤</div>
                <span class="greeting">Good afternoon, John</span>
                <span class="menu-icon" onclick="showMenu()">☰</span>
            </div>

            <!-- 定位按钮 -->
            <div class="location-btn" onclick="centerLocation()">
                <span style="font-size: 16px;">🚗</span>
            </div>
        </div>

        <!-- 地图上的车辆 -->
        <div class="map-cars">
            <div class="map-car car1" onclick="selectCar(this)">🚕</div>
            <div class="map-car car2" onclick="selectCar(this)">🚕</div>
            <div class="map-car car3" onclick="selectCar(this)">🚕</div>
            <div class="map-car car4" onclick="selectCar(this)">🚕</div>
            <div class="map-car car5" onclick="selectCar(this)">🚕</div>
            <div class="map-car car6" onclick="selectCar(this)">🚕</div>
            <div class="map-car car7" onclick="selectCar(this)">🚕</div>
        </div>

        <!-- 底部操作面板 -->
        <div class="bottom-panel">
            <!-- 搜索框 -->
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search your location" />
                <span class="schedule-link" onclick="openSchedule()">Schedule</span>
            </div>

            <!-- 添加家庭地址 -->
            <div class="location-options">
                <div class="location-option" onclick="addHome()">
                    <span class="location-icon">⭐</span>
                    <span class="location-text">Add home</span>
                </div>
            </div>
            <div class="divider"></div>

            <!-- 设置地图位置 -->
            <div class="location-options">
                <div class="location-option" onclick="setLocationOnMap()">
                    <span class="location-icon">🏠</span>
                    <span class="location-text">Set location on map</span>
                </div>
            </div>
            <div class="divider"></div>

            <!-- 底部按钮 -->
            <div class="action-buttons">
                <button class="trips-btn" onclick="openTrips()">
                    <span class="btn-icon">🚗</span>
                    <span class="btn-text">Trips</span>
                </button>
                <button class="eats-btn" onclick="openEats()">
                    <span class="btn-icon">🍽️</span>
                    <span class="btn-text">Eats</span>
                </button>
            </div>

            <!-- 底部指示器 -->
            <div class="home-indicator">
                <div class="indicator"></div>
            </div>
        </div>
    </div>

    <script>
        // 显示菜单
        function showMenu() {
            alert('打开菜单');
            console.log('打开菜单');
        }

        // 定位到当前位置
        function centerLocation() {
            const btn = document.querySelector('.location-btn');
            btn.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                alert('已定位到当前位置');
            }, 200);
        }

        // 选择车辆
        function selectCar(carElement) {
            // 清除其他车辆的选中状态
            document.querySelectorAll('.map-car').forEach(car => {
                car.style.transform = car.style.transform.replace(' scale(1.5)', '');
                car.style.zIndex = '1';
            });
            
            // 选中当前车辆
            const currentTransform = carElement.style.transform || '';
            carElement.style.transform = currentTransform + ' scale(1.5)';
            carElement.style.zIndex = '10';
            
            setTimeout(() => {
                alert('已选择车辆，准备叫车');
            }, 300);
        }

        // 添加家庭地址
        function addHome() {
            alert('添加家庭地址功能');
            console.log('添加家庭地址');
        }

        // 在地图上设置位置
        function setLocationOnMap() {
            alert('在地图上设置位置功能');
            console.log('在地图上设置位置');
        }

        // 打开行程
        function openTrips() {
            const button = document.querySelector('.trips-btn');
            button.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                button.style.transform = 'scale(1)';
                // 跳转到行程页面
                window.location.href = '../trip-pages/index.html';
            }, 150);
        }

        // 打开美食
        function openEats() {
            const button = document.querySelector('.eats-btn');
            button.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                button.style.transform = 'scale(1)';
                alert('打开美食页面');
            }, 150);
        }

        // 打开日程安排
        function openSchedule() {
            alert('打开日程安排');
            console.log('打开日程安排');
        }

        // 初始化功能
        document.addEventListener('DOMContentLoaded', function() {
            // 为搜索框添加焦点效果
            const searchInput = document.querySelector('.search-input');
            
            searchInput.addEventListener('focus', function() {
                this.parentElement.style.border = '2px solid #fecc2a';
            });

            searchInput.addEventListener('blur', function() {
                this.parentElement.style.border = 'none';
            });

            // 搜索框回车事件
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && this.value.trim()) {
                    // 跳转到搜索页面
                    window.location.href = '../search2-page/index.html';
                }
            });

            // 添加车辆悬停效果
            const cars = document.querySelectorAll('.map-car');
            cars.forEach(car => {
                car.addEventListener('mouseenter', function() {
                    if (!this.style.transform.includes('scale(1.5)')) {
                        this.style.transform = (this.style.transform || '') + ' scale(1.2)';
                    }
                });

                car.addEventListener('mouseleave', function() {
                    if (!this.style.transform.includes('scale(1.5)')) {
                        this.style.transform = this.style.transform.replace(' scale(1.2)', '');
                    }
                });
            });

            console.log('Home页面初始化完成');
        });
    </script>
</body>
</html>
