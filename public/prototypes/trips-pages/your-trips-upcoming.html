<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your trips - Upcoming - GODY</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .your-trips-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            width: 375px;
            height: 812px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 状态栏 */
        .system-status-bar {
            width: 375px;
            height: 40px;
            background: #ffffff;
        }

        /* 顶部标题区域 */
        .title-black {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            justify-content: space-between;
            padding: 19px 25px 13px 24px;
            min-width: 375px;
        }

        .group-548 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 5px;
            width: 119px;
            min-width: 119px;
            height: 16px;
        }

        .icons-delete {
            width: 16px;
            height: 16px;
            overflow: hidden;
            cursor: pointer;
        }

        .ui-text-heading-h3b {
            line-height: 16px;
            letter-spacing: 0;
            color: var(--Neutral-1, #49493d);
            font-size: 20px;
            font-weight: 500;
        }

        /* 下拉选择器 */
        .rectangle-462 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 20px;
            box-shadow: var(--Card-1, 0px 4px 40px 0px #0000000d);
            background: var(--Neutral-5, #ffffff);
            padding: 11px 16px;
            width: 111px;
            min-width: 111px;
            height: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rectangle-462:hover {
            box-shadow: var(--Card-1, 0px 6px 50px 0px #00000015);
        }

        .upcoming {
            width: 55px;
            line-height: 18px;
            letter-spacing: 0;
            color: var(--Neutral-1, #49493d);
            font-size: 12px;
            font-weight: 500;
        }

        .icons-down-arrow-1 {
            width: 12px;
            height: 12px;
            overflow: hidden;
        }

        /* 插图区域 */
        .group-551 {
            position: relative;
            margin-top: 24px;
            width: 327px;
            height: 175px;
        }

        .group-2 {
            display: flex;
            position: absolute;
            top: 0;
            left: 10px;
            align-items: flex-start;
            padding: 23px 37px 4px 48px;
            width: 313px;
            height: 175px;
            background-image: url(../.figma/image/mpqqes4z-ixh2a7s.svg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .group {
            margin-top: 123px;
            width: 21px;
            height: 21px;
        }

        .phone-location {
            position: relative;
            margin-left: 20px;
            width: 74px;
            height: 148px;
            background-image: url(../.figma/image/mpqqes4z-wpfmq0l.svg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .vector-8 {
            position: absolute;
            top: 12px;
            left: 4px;
            width: 67px;
            height: 29px;
        }

        .vector-9 {
            position: absolute;
            top: 4px;
            left: 24px;
            background: #ffffff;
            width: 1px;
            height: 138px;
        }

        .vector {
            opacity: 0.58;
            margin-top: 123px;
            margin-left: 107px;
            border-radius: 50%;
            background: #3e479b;
            width: 5px;
            height: 5px;
        }

        .vector-2 {
            position: absolute;
            top: 172px;
            left: 0;
            width: 327px;
            height: 3px;
        }

        .group-3 {
            position: absolute;
            top: 91px;
            left: 157px;
            width: 155px;
            height: 82px;
        }

        .group-4 {
            position: absolute;
            top: 60px;
            left: 199px;
            width: 61px;
            height: 61px;
        }

        .vector-10 {
            position: absolute;
            top: 65px;
            left: 103px;
            width: 54px;
            height: 72px;
        }

        .vector-11 {
            position: absolute;
            top: 65px;
            left: 133px;
            width: 37px;
            height: 93px;
        }

        .group-5 {
            position: absolute;
            top: 100px;
            left: 16px;
            width: 111px;
            height: 74px;
        }

        .group-6 {
            display: flex;
            position: absolute;
            top: 2px;
            left: 1px;
            align-items: flex-start;
            padding: 75px 178px 40px 125px;
            width: 324px;
            height: 137px;
            background-image: url(../.figma/image/mpqqes50-azwqhbl.svg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .icons-pin-31 {
            width: 22px;
            height: 22px;
            overflow: hidden;
        }

        /* 无行程提示文字 */
        .you-have-no-upcoming-tri {
            margin: 83px 0px 0px;
            line-height: 16px;
            letter-spacing: 0;
            color: var(--Neutral-1, #49493d);
            font-size: 20px;
            font-weight: 500;
        }

        /* 底部指示器 */
        .bars-home-indicator-iph {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            margin-top: 368px;
            padding: 21px 121px 8px 120px;
        }

        .home-indicator {
            border-radius: 100px;
            background: var(--Neutral-1, #49493d);
            width: 134px;
            height: 5px;
        }
    </style>
</head>
<body>
    <div class="your-trips-container">
        <!-- 状态栏 -->
        <img src="../.figma/image/mpqqes4z-5wao9xz.svg" class="system-status-bar" alt="状态栏" />
        
        <!-- 顶部标题区域 -->
        <div class="title-black">
            <div class="group-548">
                <img src="../.figma/image/mpqqes4z-se5oxgk.svg" class="icons-delete" alt="返回" onclick="goBack()" />
                <p class="ui-text-heading-h3b">Your trips</p>
            </div>
            <div class="rectangle-462" onclick="toggleTripFilter()">
                <p class="upcoming">Upcoming</p>
                <img src="../.figma/image/mpqqes4z-09v541l.svg" class="icons-down-arrow-1" alt="下拉箭头" />
            </div>
        </div>

        <!-- 插图区域 -->
        <div class="group-551">
            <div class="group-2">
                <img src="../.figma/image/mpqqes4z-f93kvln.svg" class="group" alt="装饰" />
                <div class="phone-location">
                    <img src="../.figma/image/mpqqes50-wb89hv6.svg" class="vector-8" alt="手机定位" />
                    <div class="vector-9"></div>
                </div>
                <div class="vector"></div>
            </div>
            <img src="../.figma/image/mpqqes4z-y63vn1x.svg" class="vector-2" alt="装饰线" />
            <img src="../.figma/image/mpqqes4z-lh83von.svg" class="group-3" alt="装饰" />
            <img src="../.figma/image/mpqqes4z-qgtqcmo.svg" class="group-4" alt="装饰" />
            <img src="../.figma/image/mpqqes50-nbfuh17.svg" class="vector-10" alt="装饰" />
            <img src="../.figma/image/mpqqes50-3tph7i0.svg" class="vector-11" alt="装饰" />
            <img src="../.figma/image/mpqqes50-cm0cu1o.svg" class="group-5" alt="装饰" />
            <div class="group-6">
                <img src="../.figma/image/mpqqes50-fithw89.svg" class="icons-pin-31" alt="定位图标" />
            </div>
        </div>

        <!-- 无行程提示 -->
        <p class="you-have-no-upcoming-tri">You have no upcoming trips!</p>

        <!-- 底部指示器 -->
        <div class="bars-home-indicator-iph">
            <div class="home-indicator"></div>
        </div>
    </div>

    <script>
        // 返回上一页
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '../home-page/index.html';
            }
        }

        // 切换行程筛选器
        function toggleTripFilter() {
            const filter = document.querySelector('.rectangle-462');
            const text = document.querySelector('.upcoming');
            
            if (text.textContent === 'Upcoming') {
                text.textContent = 'Past';
                // 跳转到Past版本
                setTimeout(() => {
                    window.location.href = 'your-trips-past.html';
                }, 300);
            } else {
                text.textContent = 'Upcoming';
            }
            
            // 添加点击动画
            filter.style.transform = 'scale(0.95)';
            setTimeout(() => {
                filter.style.transform = 'scale(1)';
            }, 150);
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Your trips (Upcoming) 页面初始化完成');
            
            // 为插图添加悬停效果
            const illustration = document.querySelector('.group-551');
            if (illustration) {
                illustration.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.02)';
                    this.style.transition = 'transform 0.3s ease';
                });
                
                illustration.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
            }
        });
    </script>
</body>
</html>
