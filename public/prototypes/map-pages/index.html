<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODY Map Pages</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #49493d;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #959595;
            font-size: 16px;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .page-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .page-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .page-preview {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-info {
            text-align: center;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #49493d;
            margin-bottom: 8px;
        }

        .page-description {
            font-size: 14px;
            color: #959595;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .page-link {
            display: inline-block;
            padding: 12px 24px;
            background: #fecc2a;
            color: #49493d;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .page-link:hover {
            background: #e6b824;
            transform: translateY(-2px);
        }

        .navigation {
            text-align: center;
            margin-top: 40px;
        }

        .nav-link {
            display: inline-block;
            padding: 12px 24px;
            background: #f8f9fa;
            color: #49493d;
            text-decoration: none;
            border-radius: 8px;
            margin: 0 8px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GODY Map Pages</h1>
            <p>地图相关页面集合 - 包含主页、帮助地图、路线地图和租金费用</p>
        </div>

        <div class="pages-grid">
            <!-- #1 地图主页 -->
            <div class="page-card">
                <div class="page-preview">
                    <div style="width: 200px; height: 150px; background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px;">
                        <div style="text-align: center;">
                            <div style="margin-bottom: 8px;">🗺️ 地图主页</div>
                            <div style="font-size: 12px; opacity: 0.8;">用户头像 + 搜索 + 按钮</div>
                        </div>
                    </div>
                </div>
                <div class="page-info">
                    <div class="page-title">#1 地图主页</div>
                    <div class="page-description">包含用户头像、地图、搜索框和底部操作按钮</div>
                    <a href="map-home.html" class="page-link">查看页面</a>
                </div>
            </div>

            <!-- #2 路线地图 -->
            <div class="page-card">
                <div class="page-preview">
                    <div style="width: 200px; height: 150px; background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px;">
                        <div style="text-align: center;">
                            <div style="margin-bottom: 8px;">🛤️ 路线地图</div>
                            <div style="font-size: 12px; opacity: 0.8;">路径 + GodyX + 控制</div>
                        </div>
                    </div>
                </div>
                <div class="page-info">
                    <div class="page-title">#2 路线地图</div>
                    <div class="page-description">显示路线路径、GodyX服务和地图控制按钮</div>
                    <a href="route-map.html" class="page-link">查看页面</a>
                </div>
            </div>

            <!-- #3 帮助地图 -->
            <div class="page-card">
                <div class="page-preview">
                    <div style="width: 200px; height: 150px; background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px;">
                        <div style="text-align: center;">
                            <div style="margin-bottom: 8px;">❓ 帮助地图</div>
                            <div style="font-size: 12px; opacity: 0.8;">Help按钮 + 缩放控制</div>
                        </div>
                    </div>
                </div>
                <div class="page-info">
                    <div class="page-title">#3 帮助地图</div>
                    <div class="page-description">包含Help按钮、缩放和定位控制功能</div>
                    <a href="help-map.html" class="page-link">查看页面</a>
                </div>
            </div>

            <!-- #4 租金费用 -->
            <div class="page-card">
                <div class="page-preview">
                    <div style="width: 200px; height: 150px; background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px;">
                        <div style="text-align: center;">
                            <div style="margin-bottom: 8px;">💰 租金费用</div>
                            <div style="font-size: 12px; opacity: 0.8;">费用明细 + 支付选择</div>
                        </div>
                    </div>
                </div>
                <div class="page-info">
                    <div class="page-title">#4 租金费用</div>
                    <div class="page-description">显示租金明细和支付方式选择</div>
                    <a href="rental-cost.html" class="page-link">查看页面</a>
                </div>
            </div>
        </div>

        <div class="navigation">
            <a href="../home-page/index.html" class="nav-link">🏠 返回首页</a>
            <a href="../trip-pages/index.html" class="nav-link">🚗 行程页面</a>
            <a href="../search1-page/index.html" class="nav-link">🔍 搜索页面</a>
        </div>
    </div>
</body>
</html>
