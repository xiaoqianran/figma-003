<html lang="zh-CN">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');

    :root {
      --yellow: #fecc2a;
      --ink: #0A0908;
      --paper: #F5F3ED;
      --steel: #B8B5B0;
      --alert: #C53D3D;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      background-color: #0A0908;
      color: #EDEBE5;
    }

    .console-font {
      font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
      font-feature-settings: "tnum";
    }

    .display-font {
      font-family: "Playfair Display", Georgia, "Songti SC", serif;
      font-feature-settings: "palt";
    }

    .lab-grid {
      background-image: 
        linear-gradient(rgba(184, 181, 176, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184, 181, 176, 0.035) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .archive-paper {
      background-color: #F5F3ED;
      color: #0A0908;
      box-shadow: 
        0 1px 0 #D9D4C8,
        0 2px 4px rgba(0,0,0,0.08);
    }

    .hardware-frame {
      width: 380px;
      height: 818px;
      background: #11110F;
      border-radius: 68px;
      padding: 14px;
      box-shadow: 
        0 0 0 1px #22221F,
        0 40px 80px -20px rgba(0, 0, 0, 0.6),
        0 20px 30px -10px rgba(0, 0, 0, 0.5),
        inset 0 0 0 1px #2A2926;
      position: relative;
      transition: transform 0.4s cubic-bezier(0.23, 1.0, 0.32, 1),
                  box-shadow 0.4s cubic-bezier(0.23, 1.0, 0.32, 1);
    }

    .hardware-frame::before {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 54px;
      box-shadow: inset 0 0 0 1px #1F1F1C;
      z-index: 1;
      pointer-events: none;
    }

    .hardware-frame.active {
      box-shadow: 
        0 0 0 1px #22221F,
        0 40px 80px -20px rgba(0, 0, 0, 0.6),
        0 20px 30px -10px rgba(0, 0, 0, 0.5),
        0 0 0 3px rgba(254, 204, 42, 0.15);
    }

    .device-bevel {
      position: relative;
      width: 100%;
      height: 100%;
      background: #0C0C0A;
      border-radius: 54px;
      overflow: hidden;
      box-shadow: 
        inset 0 2px 4px rgba(255,255,255,0.06),
        inset 0 -4px 8px rgba(0,0,0,0.5);
    }

    .status-light {
      width: 9px;
      height: 9px;
      background: #3A3A36;
      border-radius: 50%;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .status-light.on {
      background: #fecc2a;
      box-shadow: 
        0 0 6px #fecc2a,
        0 0 12px rgba(254, 204, 42, 0.5);
    }

    .prototype-screen {
      position: absolute;
      inset: 0;
      /* Visuals (bg, border, shadow, radius) are delegated to inner .screen-content
         so the logical viewport is *guaranteed* to be exactly 375脳812.
         The ~2.5px/3px ring around .screen-content reveals the .device-bevel
         (#0C0C0A) 鈥?this is the current bevel math: 380脳818 hardware face
         minus the precise display glass yields the documented 375脳812 target
         (plus the decorative GODY label bar at top and home indicator at bottom
         are overlaid via sibling absolutes). */
      border-radius: 46px;
      overflow: hidden;
    }

    .prototype-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Robust explicit logical screen viewport (production-grade) */
    .screen-content {
      position: absolute;
      width: 375px;
      height: 812px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #F5F3ED;
      border-radius: 46px;
      box-shadow: inset 0 0 0 1px #2A2926;
      overflow: hidden;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: #B8B5B0;
    }

    .archive-card {
      background: #F5F3ED;
      color: #0A0908;
      border: 1px solid #D9D4C8;
    }

    .metal-text {
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 2px;
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0,0,0,0.015) 51%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: multiply;
      opacity: 0.4;
    }

    .power-on {
      animation: powerOn 420ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes powerOn {
      from { opacity: 0; transform: scale(0.985); }
      to { opacity: 1; transform: scale(1); }
    }

    .subtle-grain {
      background-image: url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27%3E%3Cfilter id=%27n%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.8%27 numOctaves=%273%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%27 height=%27100%27 filter=%27url(%23n)%27 opacity=%270.06%27/%3E%3C/svg%27');
      background-size: 140px;
      pointer-events: none;
    }

    /* === Hardware Toolbar & Enhancements (榛勬帶鍙?aesthetic) === */
    .device-toolbar {
      font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .device-toolbar .tb-btn {
      background: #1A1916;
      border: 1px solid #2A2926;
      color: #B8B5B0;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 9px;
      letter-spacing: 0.75px;
      transition: all 0.08s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .device-toolbar .tb-btn:hover {
      color: #fecc2a;
      border-color: #3A3A36;
      background: #22211D;
    }
    .device-toolbar .tb-btn:active {
      background: #0F0F0D;
      transform: translateY(0.5px);
    }
    .device-toolbar .tb-btn.preset {
      padding: 2px 8px;
      min-width: 32px;
      justify-content: center;
    }
    .device-toolbar .tb-btn.preset.active {
      background: #fecc2a;
      color: #0A0908;
      border-color: #fecc2a;
      font-weight: 600;
    }
    .device-toolbar .tb-icon-btn {
      background: #1A1916;
      border: 1px solid #2A2926;
      color: #B8B5B0;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.08s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
    }
    .device-toolbar .tb-icon-btn:hover {
      color: #fecc2a;
      border-color: rgba(254, 204, 42, 0.35);
      background: #22211D;
    }
    .device-toolbar .tb-icon-btn:active {
      background: #0F0F0D;
    }

    .zoom-slider {
      width: 78px;
      height: 3px;
      background: #2A2926;
      border-radius: 999px;
      outline: none;
      accent-color: #fecc2a;
      cursor: pointer;
      vertical-align: middle;
    }
    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      background: #fecc2a;
      border-radius: 50%;
      box-shadow: 0 0 0 2px #0A0908, 0 1px 2px rgba(0,0,0,0.4);
      cursor: pointer;
      border: 1px solid #11110F;
    }
    .zoom-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      background: #fecc2a;
      border-radius: 50%;
      box-shadow: 0 0 0 2px #0A0908;
      cursor: pointer;
      border: 1px solid #11110F;
    }

    .load-overlay {
      background: rgba(12, 12, 10, 0.94);
      backdrop-filter: blur(1px);
    }

    .device-viewport {
      transition: width 0.4s cubic-bezier(0.23, 1.0, 0.32, 1),
                  height 0.4s cubic-bezier(0.23, 1.0, 0.32, 1),
                  transform 0.35s cubic-bezier(0.23, 1.0, 0.32, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      transform-origin: center center;
    }

    /* Subtle bezel reflection / edge highlight (very restrained) */
    .device-bevel::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 54px;
      background: linear-gradient(
        125deg,
        rgba(255,255,255,0.032) 8%,
        transparent 22%,
        transparent 78%,
        rgba(255,255,255,0.018) 92%
      );
      pointer-events: none;
      z-index: 6;
      opacity: 0.65;
      transition: opacity 160ms ease;
    }
    .device-bevel:hover::after,
    .hardware-frame.active .device-bevel::after {
      opacity: 0.95;
    }

    /* Dynamic registry nav styles - industrial console aesthetic */
    .nav-search-input {
      font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    .cat-filter {
      font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
      font-size: 9px;
      letter-spacing: 0.75px;
      padding: 2px 9px;
      border-radius: 9999px;
      border: 1px solid #2A2926;
      color: #B8B5B0;
      background: transparent;
      cursor: pointer;
      transition: all 0.08s cubic-bezier(0.23, 1, 0.32, 1);
      white-space: nowrap;
    }

    .cat-filter:hover {
      color: #EDEBE5;
      border-color: rgba(254, 204, 42, 0.4);
    }

    .cat-filter.active {
      background-color: #fecc2a;
      color: #0A0908;
      border-color: #fecc2a;
      font-weight: 600;
    }

    .nav-list-container {
      max-height: 468px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2A2926 #11110F;
    }

    .nav-list-container::-webkit-scrollbar {
      width: 4px;
    }

    .nav-list-container::-webkit-scrollbar-track {
      background: #11110F;
    }

    .nav-list-container::-webkit-scrollbar-thumb {
      background: #2A2926;
      border-radius: 2px;
    }

    .nav-list-container::-webkit-scrollbar-thumb:hover {
      background: #3A3A36;
    }

    .nav-section-header {
      font-size: 10px;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: #B8B5B0;
      padding: 6px 4px 2px;
      margin-top: 6px;
    }

    .nav-item {
      font-size: 13px;
      transition: all 0.1s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .nav-item:hover {
      background-color: #1A1916;
      color: #fecc2a;
    }

    .nav-item.active {
      background-color: #1F1E1B;
      color: #fecc2a;
      border-left: 3px solid #fecc2a;
      padding-left: 11px;
    }

    .nav-item .item-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* === User Flow Player (榛勬帶鍙?/ industrial metal aesthetic) === */
    .flow-pill {
      font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
      font-size: 9px;
      letter-spacing: 0.6px;
      padding: 3px 10px;
      border-radius: 9999px;
      background: #1A1916;
      border: 1px solid #2A2926;
      color: #B8B5B0;
      cursor: pointer;
      transition: all 0.08s cubic-bezier(0.23, 1, 0.32, 1);
      white-space: nowrap;
      user-select: none;
    }
    .flow-pill:hover {
      color: #fecc2a;
      border-color: rgba(254, 204, 42, 0.55);
      background: #22211D;
    }
    .flow-pill.active {
      background: #fecc2a;
      color: #0A0908;
      border-color: #fecc2a;
      font-weight: 600;
    }

    .flow-dot {
      width: 6px;
      height: 6px;
      border-radius: 9999px;
      background: #2A2926;
      border: 1px solid #3A3A36;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      flex-shrink: 0;
    }
    .flow-dot.completed {
      background: #fecc2a;
      border-color: #fecc2a;
    }
    .flow-dot.current {
      background: #fecc2a;
      border-color: #fecc2a;
      box-shadow: 0 0 0 2px rgba(254, 204, 42, 0.25);
    }

    #flow-player {
      font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
    }
    #flow-player .flow-step-title {
      font-size: 11px;
      color: #EDEBE5;
      letter-spacing: 0.2px;
    }
  </style>
</head>

    // === Registry & Rendering ===
    async function loadRegistry() {
      try {
        const res = await fetch('./page-registry.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          pageRegistry = data;
          return;
        }
      } catch (e) {
        console.warn('[GODY Console] Registry fetch failed, using fallback.', e);
      }
      pageRegistry = FALLBACK_REGISTRY;
    }

    function renderCategoryFilters() {
      const container = document.getElementById('category-filters');
      if (!container) return;
      container.innerHTML = '';

      // Optional reset chip
      const reset = document.createElement('button');
      reset.className = 'cat-filter';
      reset.textContent = 'ALL';
      reset.title = '閲嶇疆鎵€鏈夊垎绫荤瓫閫?;
      reset.onclick = () => {
        activeCategoryFilters = new Set(CATEGORY_ORDER);
        renderCategoryFilters();
        renderNavList(getCurrentSearchTerm());
      };
      container.appendChild(reset);

      CATEGORY_ORDER.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-filter' + (activeCategoryFilters.has(cat) ? ' active' : '');
        btn.textContent = cat.toUpperCase();
        btn.dataset.category = cat;
        btn.title = cat + ' 鍒嗙被绛涢€夛紙鐐瑰嚮鍒囨崲锛?;
        btn.onclick = () => {
          toggleCategory(cat);
        };
        container.appendChild(btn);
      });
    }

    function toggleCategory(cat) {
      if (activeCategoryFilters.has(cat)) {
        activeCategoryFilters.delete(cat);
      } else {
        activeCategoryFilters.add(cat);
      }
      // Re-render chips to reflect state
      renderCategoryFilters();
      renderNavList(getCurrentSearchTerm());
    }

    function getCurrentSearchTerm() {
      const input = document.getElementById('nav-search');
      return input ? input.value.trim().toLowerCase() : '';
    }

    function renderNavList(searchTerm = '') {
      const container = document.getElementById('nav-list');
      if (!container || !pageRegistry.length) return;

      container.innerHTML = '';

      const q = (searchTerm || '').toLowerCase();

      // Filter by search + active categories
      const filtered = pageRegistry.filter(p => {
        const matchesSearch = !q || 
          p.displayName.toLowerCase().includes(q) || 
          p.path.toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q);
        const matchesCat = activeCategoryFilters.has(p.category);
        return matchesSearch && matchesCat;
      });

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'px-3 py-4 text-center text-[#6E6A61] text-xs console-font';
        empty.textContent = '鏃犲尮閰嶅師鍨?;
        container.appendChild(empty);
        return;
      }

      // Group by category (preserve CATEGORY_ORDER)
      CATEGORY_ORDER.forEach(cat => {
        const items = filtered.filter(p => p.category === cat);
        if (items.length === 0) return;

        // Section header
        const header = document.createElement('div');
        header.className = 'nav-section-header section-label';
        header.textContent = cat.toUpperCase();
        container.appendChild(header);

        items.forEach(page => {
          const item = document.createElement('div');
          item.className = 'nav-item flex items-center gap-x-3 px-3 py-[6px] rounded-xl cursor-pointer text-[#EDEBE5]';
          item.dataset.path = page.path;
          item.dataset.category = page.category;
          item.title = page.description || page.displayName;

          const icon = CATEGORY_ICONS[page.category] || 'fa-file';
          item.innerHTML = `
            <i class="fa-solid ${icon} w-4 text-[#B8B5B0] flex-shrink-0"></i>
            <span class="item-name">${page.displayName}</span>
          `;

          container.appendChild(item);
        });
      });

      // Re-apply active highlight after rebuild
      applyActiveState();
    }

    function setupNavControls() {

    // === Core Load Function (uses registry for rich metadata) ===
    function loadPrototype(path, element) {
      const iframe = document.getElementById('preview-frame');
      const shell = document.getElementById('device-shell');

      // Power on if not already
      if (!isPowered) {
        powerOnDevice();
      }

      // Show high-quality loading state (yellow accent, console style)
      showLoadingOverlay(true);

      // Resolve path relative to project root (from gody-app/)
      iframe.src = '../' + path;

      currentPath = path;
      setActiveNav(element);
      applyActiveState();

      // Rich data from registry
      const page = pageRegistry.find(p => p.path === path) || { displayName: path, category: 'Other', description: '闈欐€佸鍒诲師鍨嬶紝鍙洿鎺ヤ氦浜掋€? };

      // Update UI label
      updateCurrentLabel(page.displayName.toUpperCase());

      // Update metadata panel with registry info
      updateMetadata(
        page.displayName,
        page.category,
        'LOADED',
        page.description
      );

      // Gentle device feedback 鈥?preserves current zoom + rotation transform
      const rot = isRotated ? 90 : 0;
      shell.style.transition = 'transform 80ms cubic-bezier(0.23, 1, 0.32, 1)';
      shell.style.transform = `scale(${currentZoom * 0.982}) rotate(${rot}deg)`;
      setTimeout(() => {
        shell.style.transition = 'transform 0.4s cubic-bezier(0.23, 1.0, 0.32, 1)';
        shell.style.transform = `scale(${currentZoom}) rotate(${rot}deg)`;
      }, 160);
    }

    function powerOnDevice() {
      const shell = document.getElementById('device-shell');
      const light = document.getElementById('power-indicator');
      
      shell.classList.add('active');
      light.classList.add('on');
      isPowered = true;
      
      const screen = document.getElementById('screen-container');
      screen.style.transition = 'none';
      screen.style.opacity = '0.2';
      
      setTimeout(() => {
        screen.style.transition = 'opacity 280ms cubic-bezier(0.23, 1, 0.32, 1)';
        screen.style.opacity = '1';
      }, 40);
    }

    function powerOffDevice() {
      const shell = document.getElementById('device-shell');
      const light = document.getElementById('power-indicator');
      
      shell.classList.remove('active');
      light.classList.remove('on');
      isPowered = false;
      
      const screen = document.getElementById('screen-container');
      screen.style.opacity = '0.15';
    }

    function powerCycle() {
      const light = document.getElementById('power-indicator');
      if (isPowered) {
        powerOffDevice();
      } else {
        powerOnDevice();
      }
    }

    // === Hardware Simulator Controls (toolbar) ===
    const BASE_DEVICE_W = 380;
    const BASE_DEVICE_H = 818;

    function updateDeviceTransform() {
      const viewport = document.getElementById('device-viewport');
      const frame = document.getElementById('device-shell');
      if (!viewport || !frame) return;

      const rot = isRotated ? 90 : 0;

      // Critical fix: The phone hardware (#device-shell) must ALWAYS stay at its native 380x818 size.
      // This ensures the inner .prototype-screen + iframe always occupy the full correct 375x812 area.
      // We only apply visual scale + rotation to the viewport wrapper.
      frame.style.width = BASE_DEVICE_W + 'px';
      frame.style.height = BASE_DEVICE_H + 'px';
      frame.style.transform = 'none';   // never scale/rotate the inner frame itself

      // Apply zoom + rotation to the viewport container instead.
      // This scales/rotates the entire physical phone (bezel + screen) as one unit.
      viewport.style.transform = `scale(${currentZoom}) rotate(${rot}deg)`;

      // When rotated, we still want the layout to reserve reasonable space.
      // For simplicity and stability we keep the viewport at base size and let the transform handle visuals.
      // (This prevents inner content from becoming tiny.)
      if (isRotated) {
        viewport.style.width = BASE_DEVICE_H + 'px';
        viewport.style.height = BASE_DEVICE_W + 'px';
      } else {
        viewport.style.width = BASE_DEVICE_W + 'px';
        viewport.style.height = BASE_DEVICE_H + 'px';
      }
    }

    function setZoom(z, fromSlider = false) {
      currentZoom = Math.max(0.6, Math.min(1.6, parseFloat(z)));
      updateDeviceTransform();
      syncZoomUI(fromSlider);
    }

    function setZoomPreset(z, btnEl) {
      // Deactivate other preset buttons
      document.querySelectorAll('.device-toolbar .tb-btn.preset').forEach(b => b.classList.remove('active'));
      if (btnEl) btnEl.classList.add('active');

      setZoom(z);
    }

    function syncZoomUI(fromSlider = false) {
      const slider = document.getElementById('zoom-slider');
      const val = document.getElementById('zoom-value');
      if (slider) slider.value = currentZoom;
      if (val) val.textContent = Math.round(currentZoom * 100) + '%';

      // Sync preset active states (within tolerance)
      document.querySelectorAll('.device-toolbar .tb-btn.preset').forEach(b => {
        const bz = parseFloat(b.dataset.zoom);
        b.classList.toggle('active', Math.abs(bz - currentZoom) < 0.01);
      });
    }

    function toggleRotate() {
      isRotated = !isRotated;
      const btn = document.getElementById('rotate-btn');
      if (btn) {
        btn.style.color = isRotated ? '#fecc2a' : '';
        btn.style.borderColor = isRotated ? 'rgba(254,204,42,0.4)' : '';
      }
      updateDeviceTransform();
    }

    function popOutPrototype() {
      if (!currentPath) {
        // subtle console feedback only
        console.log('%c[GODY] No prototype loaded to pop out.', 'color:#6E6A61');
        return;
      }
      const url = '../' + currentPath;
      window.open(url, '_blank');
    }

    function reloadPrototype() {
      const iframe = document.getElementById('preview-frame');
      const overlay = document.getElementById('load-overlay');
      if (!iframe || iframe.src.includes('about:blank')) return;

      // Show loading briefly for polish
      if (overlay) {
        overlay.classList.remove('hidden');
        overlay.style.opacity = '1';
      }

      // Force reload while preserving currentPath
      const currentSrc = iframe.src;
      iframe.src = 'about:blank';
      setTimeout(() => {
        iframe.src = currentSrc;
        // onload handler below will hide overlay
      }, 60);
    }

    function showLoadingOverlay(show) {
      const overlay = document.getElementById('load-overlay');
      if (!overlay) return;
      if (show) {
        overlay.style.transition = 'none';
        overlay.style.opacity = '1';
        overlay.classList.remove('hidden');
      } else {
        overlay.style.transition = 'opacity 260ms cubic-bezier(0.23, 1, 0.32, 1)';
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.classList.add('hidden');
          overlay.style.opacity = '1';
          overlay.style.transition = 'none';
        }, 260);
      }
    }

    // === User Flow Player Implementation (calls existing loadPrototype, matches 榛勬帶鍙?style) ===
    function renderFlowPills() {
      const container = document.getElementById('flow-pills');
      if (!container) return;
      container.innerHTML = '';
      USER_FLOWS.forEach(flow => {
        const pill = document.createElement('button');
        pill.className = 'flow-pill';
        pill.textContent = flow.name;
        pill.title = `鍔犺浇鐢ㄦ埛鏃呯▼锛?{flow.name}`;
        pill.onclick = () => selectFlow(flow.id);
        container.appendChild(pill);
      });
    }

    function selectFlow(flowId) {
      stopAutoPlay();
      const flow = USER_FLOWS.find(f => f.id === flowId);
      if (!flow || !flow.steps.length) return;

      currentFlow = flow;
      currentStepIndex = 0;

      // Highlight the active pill (metal yellow state)
      document.querySelectorAll('#flow-pills .flow-pill').forEach(p => {
        p.classList.toggle('active', p.textContent === flow.name);
      });

      // Reveal player panel
      const player = document.getElementById('flow-player');
      if (player) player.classList.remove('hidden');

      // Load first step via the existing core function (device updates)
      const firstStep = flow.steps[0];
      loadPrototype(firstStep.path);

      updateFlowPlayerUI();
      updateFlowMeta();
    }

    function updateFlowPlayerUI() {
      if (!currentFlow) return;
      const step = currentFlow.steps[currentStepIndex];
      if (!step) return;

      const nameEl = document.getElementById('flow-name');
      const stepEl = document.getElementById('flow-step');
      const titleEl = document.getElementById('flow-step-title');

      if (nameEl) nameEl.textContent = currentFlow.name.toUpperCase();
      if (stepEl) stepEl.textContent = `${currentStepIndex + 1} / ${currentFlow.steps.length}`;
      if (titleEl) titleEl.textContent = step.title;

      // Progress bar (yellow accent)
      const pct = Math.round(((currentStepIndex + 1) / currentFlow.steps.length) * 100);
      const bar = document.getElementById('flow-progress-bar');
      if (bar) bar.style.width = pct + '%';

      // Dots (completed / current with yellow)
      const dotsContainer = document.getElementById('flow-dots');
      if (dotsContainer) {
        dotsContainer.innerHTML = '';
        currentFlow.steps.forEach((s, i) => {
          const d = document.createElement('div');
          d.className = 'flow-dot';
          if (i < currentStepIndex) d.classList.add('completed');
          else if (i === currentStepIndex) d.classList.add('current');
          d.title = `${i + 1}. ${s.title}`;
          dotsContainer.appendChild(d);
        });
      }
    }

    function updateFlowMeta() {
      const metaFlow = document.getElementById('meta-flow');
      const metaFlowText = document.getElementById('meta-flow-text');
      if (!metaFlow || !metaFlowText) return;

      if (currentFlow) {
        const total = currentFlow.steps.length;
        metaFlowText.textContent = `Step ${currentStepIndex + 1}/${total} 路 ${currentFlow.name}`;
        metaFlow.classList.remove('hidden');
      } else {
        metaFlow.classList.add('hidden');
      }
    }

    function nextFlowStep() {
      if (!currentFlow) return;
      stopAutoPlay();
      if (currentStepIndex < currentFlow.steps.length - 1) {
        currentStepIndex++;
        const step = currentFlow.steps[currentStepIndex];
        loadPrototype(step.path);
        updateFlowPlayerUI();
        updateFlowMeta();
      }
    }

    function prevFlowStep() {
      if (!currentFlow) return;
      stopAutoPlay();
      if (currentStepIndex > 0) {
        currentStepIndex--;
        const step = currentFlow.steps[currentStepIndex];
        loadPrototype(step.path);
        updateFlowPlayerUI();
        updateFlowMeta();
      }
    }

    function restartFlow() {
      if (!currentFlow) return;
      stopAutoPlay();
      currentStepIndex = 0;
      const step = currentFlow.steps[0];
      loadPrototype(step.path);
      updateFlowPlayerUI();
      updateFlowMeta();
      // Keep pill active
      document.querySelectorAll('#flow-pills .flow-pill').forEach(p => {
        p.classList.toggle('active', p.textContent === currentFlow.name);
      });
    }

    function toggleAutoPlay() {
      const text = document.getElementById('flow-auto-text');
      const icon = document.getElementById('flow-auto-icon');
      const btn = document.getElementById('flow-auto-btn');

      if (!currentFlow) return;

      if (autoPlayTimer) {
        stopAutoPlay();
      } else {
        if (text) text.textContent = '鏆傚仠';
        if (icon) icon.className = 'fa-solid fa-pause fa-xs';
        if (btn) btn.style.borderColor = 'rgba(254,204,42,0.55)';

        autoPlayTimer = setInterval(() => {
          if (!currentFlow) {
            stopAutoPlay();
            return;
          }
          if (currentStepIndex < currentFlow.steps.length - 1) {
            currentStepIndex++;
            const step = currentFlow.steps[currentStepIndex];
            loadPrototype(step.path);
            updateFlowPlayerUI();
            updateFlowMeta();
          } else {
            stopAutoPlay();
          }
        }, 1200);
      }
    }

    function stopAutoPlay() {
      if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
      }
      const text = document.getElementById('flow-auto-text');
      const icon = document.getElementById('flow-auto-icon');
      const btn = document.getElementById('flow-auto-btn');
      if (text) text.textContent = '鑷姩鎾斁';
      if (icon) icon.className = 'fa-solid fa-play fa-xs';
      if (btn) btn.style.borderColor = '';
    }

    function setupFlowPlayer() {
      // Wire robust listeners (HTML buttons have no inline handlers)
      const nextBtn = document.getElementById('flow-next-btn');
      const prevBtn = document.getElementById('flow-prev-btn');
      const restartBtn = document.getElementById('flow-restart-btn');
      const autoBtn = document.getElementById('flow-auto-btn');

      if (nextBtn) nextBtn.addEventListener('click', nextFlowStep);
      if (prevBtn) prevBtn.addEventListener('click', prevFlowStep);
      if (restartBtn) restartBtn.addEventListener('click', restartFlow);
      if (autoBtn) autoBtn.addEventListener('click', toggleAutoPlay);

      // Populate the list of metal flow pills
      renderFlowPills();
    }

    // Non-breaking enhancement: reset flow state cleanly on power off
    const _origPowerOffDevice = powerOffDevice;
    powerOffDevice = function() {
      if (typeof _origPowerOffDevice === 'function') _origPowerOffDevice();
      stopAutoPlay();
      currentFlow = null;
      currentStepIndex = 0;
      const player = document.getElementById('flow-player');
      if (player) player.classList.add('hidden');
      document.querySelectorAll('#flow-pills .flow-pill').forEach(p => p.classList.remove('active'));
      const mf = document.getElementById('meta-flow');
      if (mf) mf.classList.add('hidden');
    };

    // === Keyboard support (enhanced) ===
    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && document.activeElement.tagName === 'BODY') {
        e.preventDefault();
        const search = document.getElementById('nav-search');
        if (search) {
          search.focus();
          search.select();
        } else {
          const first = document.querySelector('#nav-list .nav-item');
          if (first) first.click();
        }
      }
      if (e.key.toLowerCase() === 'p') {
        powerCycle();
      }
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        const search = document.getElementById('nav-search');
        if (search) {
          search.focus();
          search.select();
        }
      }
    });

    // === Initialization ===
    async function initConsole() {
      await loadRegistry();

      // Initial renders
      renderCategoryFilters();
      renderNavList('');

      // Wire up search + clicks
      setupNavControls();

      // Initialize User Flow Player (pills + controls + wiring)
      setupFlowPlayer();

      // === Hardware simulator init (toolbar controls + loading) ===
      // Initial transform state (ensures viewport + frame match defaults)
      updateDeviceTransform();
      syncZoomUI();

      // Attach single load listener for prototype iframe 鈥?hides loading overlay cleanly
      const iframeEl = document.getElementById('preview-frame');
      if (iframeEl) {
        iframeEl.addEventListener('load', () => {
          // Hide loading if visible (covers both loadPrototype + reloads)
          const overlay = document.getElementById('load-overlay');
          if (overlay && !overlay.classList.contains('hidden')) {
            showLoadingOverlay(false);
          }
        });
      }

      // Boot indicator
      const light = document.getElementById('power-indicator');
      setTimeout(() => {
        if (light) light.style.background = '#3A3A36';
      }, 600);

      // Optional: auto-load a sensible default (commented for clean start)
      setTimeout(() => {
        if (!currentPath) {
          // Uncomment to auto-load on open:
          // const login = pageRegistry.find(p => p.path.includes('login'));
          // if (login) {
          //   const el = document.querySelector(`#nav-list .nav-item[data-path="${login.path}"]`);
          //   loadPrototype(login.path, el);
          // }
        }
      }, 900);

      // Expose rich API (including new hardware controls + User Flow Player)
      window.GODY_CONSOLE = { 
        loadPrototype, 
        powerCycle, 
        loadRegistry, 
        renderNavList, 
        getRegistry: () => pageRegistry,
        setZoom, 
        toggleRotate,
        popOutPrototype,
        reloadPrototype,
        // Flow player controls (public)
        selectFlow, renderFlowPills, nextFlowStep, prevFlowStep, restartFlow, toggleAutoPlay, getCurrentFlow: () => ({ flow: currentFlow, step: currentStepIndex })
      };

      console.log('%c[GODY Console] Dynamic registry navigation ready 鈥?' + pageRegistry.length + ' prototypes loaded.', 'color:#B8B5B0');
    }

    // Start everything
    window.onload = initConsole;
  </script>
</body>
