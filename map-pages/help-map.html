<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Map - GODY</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .help-container {
            position: relative;
            background: #ffffff;
            width: 375px;
            height: 812px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 状态栏 */
        .status-bar {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .time {
            font-size: 14px;
            font-weight: 600;
            color: #000000;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            font-size: 12px;
        }

        /* 标题栏 */
        .title-bar {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            justify-content: space-between;
            padding: 12px 24px 20px;
            min-width: 375px;
        }

        .back-button {
            margin-top: 12px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            font-size: 16px;
            color: #49493d;
            transition: all 0.2s ease;
        }

        .back-button:hover {
            color: #fecc2a;
            transform: scale(1.2);
        }

        .help-button {
            display: flex;
            align-items: center;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
        }

        .help-content {
            display: flex;
            flex-grow: 1;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            background: #ffffff;
            padding: 10px 34px 10px 32px;
        }

        .help-text {
            line-height: 20px;
            letter-spacing: 0;
            color: #49493d;
            font-size: 16px;
            font-weight: 500;
        }

        /* 地图区域 */
        .map-area {
            position: relative;
            height: 812px;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4edda 50%, #fff3cd 100%);
        }

        .map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 定位标记 */
        .location-marker {
            display: flex;
            align-items: center;
            align-self: stretch;
            margin: 305px 57px 0px 308px;
        }

        .location-dot {
            border-radius: 50%;
            background: #fecc2a;
            width: 10px;
            height: 10px;
        }

        /* 控制按钮 */
        .control-buttons {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            justify-content: space-between;
            margin-top: 207px;
            padding-right: 24px;
            padding-left: 148px;
        }

        .zoom-button {
            display: flex;
            align-items: center;
            margin-top: 40px;
            border-radius: 50%;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            background: #ffffff;
            padding: 23px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .zoom-icon {
            width: 33px;
            height: 33px;
            font-size: 20px;
        }

        .crosshair-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            align-self: stretch;
        }

        .crosshair-button {
            display: flex;
            align-items: center;
            align-self: stretch;
            border-radius: 50%;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            background: #ffffff;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .crosshair-button:hover {
            transform: scale(1.1);
        }

        .crosshair-icon {
            width: 20px;
            height: 20px;
            font-size: 16px;
        }

        .crosshair-button2 {
            display: flex;
            align-items: center;
            align-self: stretch;
            margin-top: 16px;
            border-radius: 50%;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            background: #ffffff;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .crosshair-button2:hover {
            transform: scale(1.1);
        }

        /* 底部指示器 */
        .home-indicator {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            margin-top: 24px;
            padding: 21px 121px 8px 120px;
            width: 100%;
        }

        .indicator {
            border-radius: 100px;
            background: #49493d;
            width: 134px;
            height: 5px;
        }
    </style>
</head>
<body>
    <div class="help-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="time">9:09</span>
            <div class="status-icons">
                <span>📶</span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 标题栏 -->
        <div class="title-bar">
            <div class="back-button" onclick="goBack()">←</div>
            <div class="help-button">
                <div class="help-content">
                    <span class="help-text">Help</span>
                </div>
            </div>
        </div>

        <!-- 地图区域 -->
        <div class="map-area">
            <div class="map-grid"></div>
            
            <!-- 定位标记 -->
            <div class="location-marker">
                <div class="location-dot"></div>
            </div>

            <!-- 控制按钮 -->
            <div class="control-buttons">
                <div class="zoom-button" onclick="zoomMap()">
                    <span class="zoom-icon">🔍</span>
                </div>
                
                <div class="crosshair-buttons">
                    <div class="crosshair-button" onclick="centerLocation()">
                        <span class="crosshair-icon">🎯</span>
                    </div>
                    <div class="crosshair-button2" onclick="showRoute()">
                        <span class="crosshair-icon">✅</span>
                    </div>
                </div>
            </div>

            <!-- 底部指示器 -->
            <div class="home-indicator">
                <div class="indicator"></div>
            </div>
        </div>
    </div>

    <script>
        // 返回上一页
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'map-home.html';
            }
        }

        // 缩放地图
        function zoomMap() {
            const zoomBtn = document.querySelector('.zoom-button');
            zoomBtn.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                zoomBtn.style.transform = 'scale(1)';
                alert('地图已缩放');
            }, 200);
        }

        // 定位到当前位置
        function centerLocation() {
            const crosshairBtn = document.querySelector('.crosshair-button');
            crosshairBtn.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                crosshairBtn.style.transform = 'scale(1)';
                alert('已定位到当前位置');
            }, 200);
        }

        // 显示路线
        function showRoute() {
            const routeBtn = document.querySelector('.crosshair-button2');
            routeBtn.style.transform = 'scale(0.8)';
            routeBtn.style.background = '#00b894';
            
            setTimeout(() => {
                routeBtn.style.transform = 'scale(1)';
                routeBtn.style.background = '#ffffff';
                alert('显示路线规划');
            }, 200);
        }

        // 初始化功能
        document.addEventListener('DOMContentLoaded', function() {
            // 为按钮添加触摸反馈
            const buttons = document.querySelectorAll('.zoom-button, .crosshair-button, .crosshair-button2');
            buttons.forEach(button => {
                button.addEventListener('touchstart', function() {
                    this.style.background = '#e8e8ea';
                });
                
                button.addEventListener('touchend', function() {
                    this.style.background = '#ffffff';
                });
            });

            console.log('#3 帮助地图页面初始化完成');
        });
    </script>
</body>
</html>
