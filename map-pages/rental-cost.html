<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Cost - GODY</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .rental-container {
            position: relative;
            background: #ffffff;
            width: 375px;
            height: 812px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 状态栏 */
        .status-bar {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .time {
            font-size: 14px;
            font-weight: 600;
            color: #000000;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            font-size: 12px;
        }

        /* 标题栏 */
        .title-bar {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            justify-content: space-between;
            padding: 12px 24px 20px;
            min-width: 375px;
        }

        .back-button {
            margin-top: 12px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            font-size: 16px;
            color: #49493d;
            transition: all 0.2s ease;
        }

        .back-button:hover {
            color: #fecc2a;
            transform: scale(1.2);
        }

        .help-button {
            display: flex;
            align-items: center;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
        }

        .help-content {
            display: flex;
            flex-grow: 1;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            background: #ffffff;
            padding: 10px 34px 10px 32px;
        }

        .help-text {
            line-height: 20px;
            letter-spacing: 0;
            color: #49493d;
            font-size: 16px;
            font-weight: 500;
        }

        /* 地图区域 */
        .map-area {
            position: relative;
            height: 812px;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4edda 50%, #fff3cd 100%);
        }

        .map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 路径线条 */
        .route-path {
            position: absolute;
            top: 255px;
            left: 30px;
            width: 268px;
            height: 246px;
            background: linear-gradient(45deg, transparent, #fecc2a, transparent);
            opacity: 0.8;
            border-radius: 50%;
        }

        /* 控制按钮 */
        .control-buttons {
            position: absolute;
            top: 287px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-button {
            display: flex;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            background: #ffffff;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-button:hover {
            transform: scale(1.1);
        }

        .control-icon {
            width: 20px;
            height: 20px;
            font-size: 16px;
        }

        /* 费用信息卡片 */
        .cost-card {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 24px 24px 0px 0px;
            box-shadow: 0px 4px 40px 0px rgba(0,0,0,0.1);
            padding: 32px 25px 50px 23px;
        }

        .cost-title {
            line-height: 16px;
            letter-spacing: 0;
            color: #49493d;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .cost-item {
            display: flex;
            align-items: flex-start;
            align-self: stretch;
            justify-content: space-between;
            margin-top: 24px;
            min-width: 327px;
        }

        .cost-label {
            line-height: 20px;
            letter-spacing: 0;
            color: #49493d;
            font-size: 14px;
        }

        .cost-value {
            line-height: 20px;
            letter-spacing: 0;
            color: #49493d;
            font-size: 14px;
            font-weight: 500;
        }

        .cost-divider {
            width: 212px;
            line-height: 18px;
            letter-spacing: 0;
            color: #ececec;
            font-size: 12px;
        }

        .payment-button {
            display: flex;
            align-items: center;
            align-self: stretch;
            margin-top: 28px;
            border-radius: 12px;
            background: #fecc2a;
            padding: 14px 79px 14px 78px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .payment-button:hover {
            background: #e6b824;
            transform: translateY(-2px);
        }

        .payment-text {
            line-height: 20px;
            letter-spacing: 0;
            color: #49493d;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            text-align: center;
        }

        /* 底部指示器 */
        .home-indicator {
            display: flex;
            position: absolute;
            top: 778px;
            left: -1px;
            align-items: flex-start;
            padding: 21px 121px 8px 120px;
            width: 375px;
            height: 34px;
        }

        .indicator {
            border-radius: 100px;
            background: #49493d;
            width: 134px;
            height: 5px;
        }
    </style>
</head>
<body>
    <div class="rental-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="time">9:09</span>
            <div class="status-icons">
                <span>📶</span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 标题栏 -->
        <div class="title-bar">
            <div class="back-button" onclick="goBack()">←</div>
            <div class="help-button">
                <div class="help-content">
                    <span class="help-text">Help</span>
                </div>
            </div>
        </div>

        <!-- 地图区域 -->
        <div class="map-area">
            <div class="map-grid"></div>
            <div class="route-path"></div>
            
            <!-- 控制按钮 -->
            <div class="control-buttons">
                <div class="control-button" onclick="centerLocation()">
                    <span class="control-icon">🎯</span>
                </div>
                <div class="control-button" onclick="showRoute()">
                    <span class="control-icon">✅</span>
                </div>
            </div>

            <!-- GodyX信息卡片 -->
            <div class="godyx-card" onclick="selectGodyX()">
                <div class="godyx-info">
                    <span class="godyx-icon">🚗</span>
                    <span class="godyx-text">GodyX</span>
                </div>
                <span class="time-info">10<br>min</span>
            </div>

            <!-- 费用信息卡片 -->
            <div class="cost-card">
                <div class="cost-title">Rental cost</div>
                
                <div class="cost-item">
                    <div class="cost-label">Minium fare</div>
                    <div class="cost-divider">_ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _</div>
                    <div class="cost-value">$2.20</div>
                </div>
                
                <div class="cost-item">
                    <div class="cost-label">Additional time</div>
                    <div class="cost-divider">_ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _</div>
                    <div class="cost-value">$2.70</div>
                </div>
                
                <div class="payment-button" onclick="selectPayment()">
                    <span class="payment-text">Select payment method</span>
                </div>
            </div>

            <!-- 底部指示器 -->
            <div class="home-indicator">
                <div class="indicator"></div>
            </div>
        </div>
    </div>

    <script>
        // 返回上一页
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'map-home.html';
            }
        }

        // 定位到当前位置
        function centerLocation() {
            const btn = document.querySelector('.control-button');
            btn.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                alert('已定位到当前位置');
            }, 200);
        }

        // 显示路线
        function showRoute() {
            const btn = document.querySelectorAll('.control-button')[1];
            btn.style.transform = 'scale(0.8)';
            btn.style.background = '#00b894';
            
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                btn.style.background = '#ffffff';
                alert('显示路线');
            }, 200);
        }

        // 选择GodyX服务
        function selectGodyX() {
            const card = document.querySelector('.godyx-card');
            card.style.transform = 'scale(0.95)';
            card.style.background = '#00b894';
            
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                card.style.background = '#fecc2a';
                alert('已选择GodyX服务');
            }, 300);
        }

        // 选择支付方式
        function selectPayment() {
            const button = document.querySelector('.payment-button');
            button.style.transform = 'scale(0.95)';
            button.style.background = '#00b894';
            
            setTimeout(() => {
                button.style.transform = 'scale(1)';
                button.style.background = '#fecc2a';
                alert('选择支付方式');
                // 可以跳转到支付页面
            }, 300);
        }

        // 初始化功能
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.control-button, .payment-button, .godyx-card');
            buttons.forEach(button => {
                button.addEventListener('touchstart', function() {
                    this.style.opacity = '0.7';
                });
                
                button.addEventListener('touchend', function() {
                    this.style.opacity = '1';
                });
            });

            console.log('#4 租金费用页面初始化完成');
        });
    </script>
</body>
</html>
